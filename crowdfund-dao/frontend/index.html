<!DOCTYPE html>
<html>
<head>
  <title>CrowdDAO</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #2a2a3a;
      --accent: #00ff88;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --error: #ff4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;

      background: linear-gradient(90deg, var(--accent), var(--accent2));

      /* FIXED WARNING */
      background-clip: text;
      -webkit-background-clip: text;

      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
      font-family: 'Space Mono', monospace;
    }

    #connectBtn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px 22px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 6px;
      transition: opacity 0.2s;
    }

    #connectBtn:hover {
      opacity: 0.85;
    }

    #account {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      margin-top: 10px;
      word-break: break-all;
      white-space: pre-line;
    }

    #network-badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 6px;
      background: #1a1a2e;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    #network-badge.sepolia {
      color: var(--accent);
      border-color: var(--accent);
    }

    #status {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 6px;
      background: #0d1f17;
      border-left: 3px solid var(--accent);
      color: var(--accent);
      display: none;
    }

    #status.error {
      background: #1f0d0d;
      border-color: var(--error);
      color: var(--error);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      margin-top: 20px;
    }

    .card h3 {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      text-transform: uppercase;
      color: var(--muted);
    }

    input {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--muted);
    }

    .btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 9px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 6px;
      margin-right: 8px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--accent);
      color: #000;
    }

    .btn.primary {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .btn.primary:hover {
      opacity: 0.85;
    }

    .btn.danger {
      border-color: var(--error);
      color: var(--error);
    }

    .btn.danger:hover {
      background: var(--error);
      color: #fff;
    }
  </style>
</head>

<body>

  <div class="container">

    <header>
      <h1>CrowdDAO</h1>
      <p>Sepolia Testnet · Decentralized Crowdfunding</p>
    </header>

    <button id="connectBtn">Connect Wallet</button>

    <div id="account"></div>

    <div id="network-badge">
      not connected
    </div>

    <div id="status"></div>

    <!-- FUND -->
    <div class="card">
      <h3>Fund Campaign</h3>

      <input
        id="ethAmount"
        placeholder="ETH amount (e.g. 0.01)"
        type="number"
        step="0.01"
      />

      <button class="btn primary" id="fundBtn">
        Fund
      </button>
    </div>

    <!-- CREATE PROPOSAL -->
    <div class="card">
      <h3>Create Proposal</h3>

      <input
        id="desc"
        placeholder="Description"
      />

      <input
        id="recipient"
        placeholder="Recipient address (0x...)"
      />

      <input
        id="amount"
        placeholder="Amount in Wei (e.g. 1000000000000000)"
      />

      <button class="btn primary" id="propBtn">
        Create Proposal
      </button>
    </div>

    <!-- VOTE -->
    <div class="card">
      <h3>Vote on Proposal</h3>

      <input
        id="propId"
        placeholder="Proposal ID (e.g. 0)"
      />

      <button class="btn primary" id="voteYes">
        Vote Yes
      </button>

      <button class="btn danger" id="voteNo">
        Vote No
      </button>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

  <script>
    const CAMPAIGN_ADDR = "0x49dC738B82DB7301e6cb3Af724605dD5a861DCb6";
    const DAO_ADDR = "0x4F7BE1068da75D70239E6AdAb2f939c02Ccb81e8";

    const SEPOLIA_CHAIN_ID = "0xaa36a7";

    const CAMPAIGN_ABI = [
      "function fund() external payable",
      "function refund() external",
      "function withdraw() external",
      "function totalRaised() view returns (uint256)",
      "function goalReached() view returns (bool)",
      "function contributions(address) view returns (uint256)"
    ];

    const DAO_ABI = [
      "function createProposal(string calldata, address payable, uint256, uint256) external returns (uint256)",
      "function vote(uint256, bool) external",
      "function execute(uint256) external",
      "function proposalCount() view returns (uint256)"
    ];

    let signer;

    function setStatus(message, isError = false) {
      const el = document.getElementById("status");

      el.textContent = message;
      el.style.display = "block";

      el.classList.toggle("error", isError);
    }

    function updateNetworkBadge(chainId) {
      const badge = document.getElementById("network-badge");

      if (
        chainId === SEPOLIA_CHAIN_ID ||
        chainId === 11155111 ||
        chainId === "11155111"
      ) {
        badge.textContent = "✓ Sepolia Testnet";
        badge.className = "sepolia";
      } else {
        badge.textContent = "⚠ Wrong Network — Please switch to Sepolia";
        badge.className = "";
      }
    }

    // CONNECT WALLET
    document.getElementById("connectBtn").onclick = async () => {

      try {

        if (!window.ethereum) {
          setStatus("MetaMask not found. Please install it.", true);
          return;
        }

        // Request accounts
        await window.ethereum.request({
          method: "eth_requestAccounts"
        });

        // Switch to Sepolia
        try {

          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: SEPOLIA_CHAIN_ID }]
          });

        } catch (switchErr) {

          // Add Sepolia if missing
          if (switchErr.code === 4902) {

            await window.ethereum.request({
              method: "wallet_addEthereumChain",
              params: [{
                chainId: SEPOLIA_CHAIN_ID,
                chainName: "Sepolia Testnet",

                nativeCurrency: {
                  name: "ETH",
                  symbol: "ETH",
                  decimals: 18
                },

                rpcUrls: [
                  "https://rpc.sepolia.org"
                ],

                blockExplorerUrls: [
                  "https://sepolia.etherscan.io"
                ]
              }]
            });

          } else {
            throw switchErr;
          }
        }

        const provider = new ethers.BrowserProvider(window.ethereum);

        const network = await provider.getNetwork();

        signer = await provider.getSigner();

        const address = await signer.getAddress();

        const balance = await provider.getBalance(address);

        document.getElementById("account").textContent =
          "Connected: " + address +
          "\nBalance: " +
          ethers.formatEther(balance) +
          " ETH";

        updateNetworkBadge(network.chainId.toString());

        setStatus("✓ Wallet connected on Sepolia!");

      } catch (e) {

        setStatus("Error: " + e.message, true);

      }
    };

    // Detect network change
    if (window.ethereum) {

      window.ethereum.on("chainChanged", (chainId) => {

        updateNetworkBadge(chainId);

        if (chainId !== SEPOLIA_CHAIN_ID) {

          setStatus(
            "⚠ Wrong network detected. Please switch to Sepolia.",
            true
          );

        }

      });

    }

    // FUND CAMPAIGN
    document.getElementById("fundBtn").onclick = async () => {

      try {

        if (!signer) {
          setStatus("Connect wallet first.", true);
          return;
        }

        const campaign = new ethers.Contract(
          CAMPAIGN_ADDR,
          CAMPAIGN_ABI,
          signer
        );

        const eth = document.getElementById("ethAmount").value;

        if (!eth || isNaN(eth)) {
          setStatus("Enter a valid ETH amount.", true);
          return;
        }

        setStatus("Funding campaign... confirm in MetaMask");

        const tx = await campaign.fund({
          value: ethers.parseEther(eth)
        });

        setStatus("Transaction sent, waiting for confirmation...");

        await tx.wait();

        setStatus("✓ Funded! Tx: " + tx.hash);

      } catch (e) {

        setStatus("Error: " + e.message, true);

      }
    };

    // CREATE PROPOSAL
    document.getElementById("propBtn").onclick = async () => {

      try {

        if (!signer) {
          setStatus("Connect wallet first.", true);
          return;
        }

        const dao = new ethers.Contract(
          DAO_ADDR,
          DAO_ABI,
          signer
        );

        setStatus("Creating proposal... confirm in MetaMask");

        const tx = await dao.createProposal(
          document.getElementById("desc").value,
          document.getElementById("recipient").value,
          document.getElementById("amount").value,
          3
        );

        setStatus("Transaction sent, waiting for confirmation...");

        await tx.wait();

        setStatus("✓ Proposal created! Tx: " + tx.hash);

      } catch (e) {

        setStatus("Error: " + e.message, true);

      }
    };

    // VOTE YES
    document.getElementById("voteYes").onclick = async () => {

      try {

        if (!signer) {
          setStatus("Connect wallet first.", true);
          return;
        }

        const dao = new ethers.Contract(
          DAO_ADDR,
          DAO_ABI,
          signer
        );

        setStatus("Voting yes... confirm in MetaMask");

        const tx = await dao.vote(
          document.getElementById("propId").value,
          true
        );

        await tx.wait();

        setStatus("✓ Voted yes! Tx: " + tx.hash);

      } catch (e) {

        setStatus("Error: " + e.message, true);

      }
    };

    // VOTE NO
    document.getElementById("voteNo").onclick = async () => {

      try {

        if (!signer) {
          setStatus("Connect wallet first.", true);
          return;
        }

        const dao = new ethers.Contract(
          DAO_ADDR,
          DAO_ABI,
          signer
        );

        setStatus("Voting no... confirm in MetaMask");

        const tx = await dao.vote(
          document.getElementById("propId").value,
          false
        );

        await tx.wait();

        setStatus("✓ Voted no! Tx: " + tx.hash);

      } catch (e) {

        setStatus("Error: " + e.message, true);

      }
    };
  </script>

</body>
</html>
